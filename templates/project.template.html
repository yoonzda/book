<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Project</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- 커스텀 커서 -->
    <div class="custom-cursor"></div>

    <!-- 노이즈 캔버스 배경 -->
    <canvas id="noise-canvas"></canvas>

    <!-- 상단 내비게이션 바 -->
    <header>
        <a href="/" class="logo" id="home-link">YOONZDA</a>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="nav-link" id="toggle-invert">INVERT</a></li>
                <li><a href="#" class="nav-link" id="toggle-serif">FONT</a></li>
                <li><a href="/" class="nav-link" id="back-link">BACK TO LIST</a></li>
            </ul>
        </nav>
    </header>

    <!-- 프로젝트 상세 내용 레이아웃 -->
    <main class="main-content project-detail-main">
        <article class="project-section in-view project-detail-section">
            <div class="grid-container">
                <!-- 좌측 정보단 -->
                <div class="project-info-column">
                    <div>
                        <span class="project-category">{{CATEGORY}}</span>
                        <h1 class="project-title project-detail-title">{{TITLE}}</h1>
                        <p class="project-desc">{{DESCRIPTION}}</p>
                    </div>

                    <!-- 상세 정보 메타 데이터 표 -->
                    <div class="project-meta-grid">
                        <div>
                            <span class="project-meta-label project-meta-sublabel">CLIENT</span>
                            <span class="project-meta-value">{{CLIENT}}</span>
                        </div>
                        <div>
                            <span class="project-meta-label project-meta-sublabel">YEAR</span>
                            <span class="project-meta-value">{{YEAR}}</span>
                        </div>
                        <div class="project-link-row">
                            <span class="project-meta-label project-meta-sublabel">LIVE DEMO</span>
                            <a href="{{LINK}}" target="_blank" class="btn-brutal">
                                VISIT WEBSITE
                            </a>
                        </div>
                    </div>
                </div>

                <!-- 우측 이미지단 -->
                <div class="project-image-column">
                    <div class="project-image-wrapper">
                        <img src="{{IMAGE}}" alt="{{TITLE}}" class="project-image-display" loading="lazy">
                    </div>
                </div>
            </div>
        </article>
    </main>

    <!-- 인터랙션 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 커스텀 마우스 커서 (Lerp + requestAnimationFrame)
            const cursor = document.querySelector('.custom-cursor');
            let mouseX = 0, mouseY = 0;
            let cursorX = 0, cursorY = 0;
            const lerpFactor = 0.1;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * lerpFactor;
                cursorY += (mouseY - cursorY) * lerpFactor;
                cursor.style.transform = `translate3d(${cursorX - 10}px, ${cursorY - 10}px, 0)`;
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            // 링크/버튼 호버 효과
            const interactiveElements = document.querySelectorAll('a, button');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
            });

            // 2. 필름 노이즈(Film Grain) 효과
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            function renderNoise() {
                ctx.clearRect(0, 0, w, h);
                const idata = ctx.createImageData(w, h);
                const buffer32 = new Uint32Array(idata.data.buffer);
                const len = buffer32.length;
                
                for (let i = 0; i < len; i += 13) {
                    if (Math.random() < 0.05) {
                        buffer32[i] = 0x15ffffff;
                    }
                }
                ctx.putImageData(idata, 0, 0);
                setTimeout(() => {
                    requestAnimationFrame(renderNoise);
                }, 50);
            }
            requestAnimationFrame(renderNoise);

            // 3. 테마 반전(Invert) 및 폰트 변경 토글 기능
            const btnInvert = document.getElementById('toggle-invert');
            const btnSerif = document.getElementById('toggle-serif');

            if (localStorage.getItem('theme-invert') === 'true') {
                document.body.classList.add('invert-mode');
            }
            if (localStorage.getItem('font-serif') === 'true') {
                document.body.classList.add('serif-mode');
            }

            btnInvert.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.toggle('invert-mode');
                localStorage.setItem('theme-invert', document.body.classList.contains('invert-mode'));
            });

            btnSerif.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.toggle('serif-mode');
                localStorage.setItem('font-serif', document.body.classList.contains('serif-mode'));
            });

            // 4. 페이지 뒤로가기 / 홈 이동 시 트랜지션
            const navigateElements = [
                document.getElementById('home-link'),
                document.getElementById('back-link')
            ];
            
            navigateElements.forEach(el => {
                if (el) {
                    el.addEventListener('click', (e) => {
                        e.preventDefault();
                        const target = el.href;
                        document.body.classList.add('page-exit');
                        setTimeout(() => {
                            window.location.href = target;
                        }, 400);
                    });
                }
            });
        });
    </script>
</body>
</html>
