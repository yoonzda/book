<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 - YOONZDA</title>
    <link rel="icon" type="image/png" href="images/logo-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 초기 테마 반전(Invert) 설정: 첫 렌더링 전 깜빡임 차단 -->
    <script>
        if (localStorage.getItem('theme-invert') === 'true') {
            document.body.classList.add('invert-mode');
        }
    </script>
    <!-- 커스텀 커서 -->
    <div class="custom-cursor"></div>

    <!-- 노이즈 캔버스 배경 -->
    <canvas id="noise-canvas"></canvas>

    <!-- 상단 내비게이션 바 -->
    <header>
        <a href="/" class="logo" id="home-link">
            <img src="images/logo-icon.png" alt="YOONZDA" class="logo-icon">
            <div class="logo-text-group">
                <span class="logo-title">yoonzda<span class="logo-dot">.</span></span>
                <span class="logo-subtitle">Creative Web Developer</span>
            </div>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="nav-link" id="toggle-invert">INVERT</a></li>
                <li><a href="/" class="nav-link" id="back-link">GO TO SITE</a></li>
            </ul>
        </nav>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="main-content">
        
        <!-- 프로젝트 관리 대시보드 -->
        <div id="admin-panel" class="admin-panel-container">
            <div class="admin-title-row">
                <div>
                    <span class="project-category">WORKSPACE</span>
                    <h1 class="project-title admin-header-title">프로젝트 목록</h1>
                </div>
                <div class="admin-action-group">
                    <a href="/form.html" class="btn-add-plus" id="btn-add-proj-nav" aria-label="새 프로젝트 등록">
                        <span class="plus-icon">+</span>
                        <span class="plus-text">프로젝트 등록</span>
                    </a>
                </div>
            </div>

            <!-- 프로젝트 목록 카드 리스트 -->
            <div class="admin-cards-list" id="projects-cards-list">
                <!-- 자바스크립트로 카드 형태 렌더링 -->
            </div>
        </div>
    </main>

    <!-- 하단 플로팅 액션 바 -->
    <div class="floating-action-bar" id="reorder-floating-bar">
        <button id="btn-reorder-start" class="btn-floating-pill">
            <span class="btn-dot-glow"></span>
            <span id="reorder-btn-text">순서 변경</span>
        </button>
    </div>

    <!-- 관리 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -----------------------------------------
            // 1. 커스텀 마우스 커서 (Lerp)
            // -----------------------------------------
            const cursor = document.querySelector('.custom-cursor');
            let mouseX = 0, mouseY = 0;
            let cursorX = 0, cursorY = 0;
            const lerpFactor = 0.1;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * lerpFactor;
                cursorY += (mouseY - cursorY) * lerpFactor;
                cursor.style.transform = `translate3d(${cursorX - 10}px, ${cursorY - 10}px, 0)`;
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            // 호버 감지
            function bindHoverEffects() {
                const interactiveElements = document.querySelectorAll('a, button, .admin-project-card');
                interactiveElements.forEach(el => {
                    el.removeEventListener('mouseenter', addHoverClass);
                    el.removeEventListener('mouseleave', removeHoverClass);
                    el.addEventListener('mouseenter', addHoverClass);
                    el.addEventListener('mouseleave', removeHoverClass);
                });
            }

            function addHoverClass() { cursor.classList.add('hovered'); }
            function removeHoverClass() { cursor.classList.remove('hovered'); }

            bindHoverEffects();

            // -----------------------------------------
            // 2. 필름 노이즈(Film Grain) 효과
            // -----------------------------------------
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            function renderNoise() {
                ctx.clearRect(0, 0, w, h);
                const idata = ctx.createImageData(w, h);
                const buffer32 = new Uint32Array(idata.data.buffer);
                const len = buffer32.length;
                
                for (let i = 0; i < len; i += 13) {
                    if (Math.random() < 0.05) {
                        buffer32[i] = 0x15ffffff;
                    }
                }
                ctx.putImageData(idata, 0, 0);
                setTimeout(() => {
                    requestAnimationFrame(renderNoise);
                }, 50);
            }
            requestAnimationFrame(renderNoise);

            // 3. 테마 반전 토글
            const btnInvert = document.getElementById('toggle-invert');



            btnInvert.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.toggle('invert-mode');
                localStorage.setItem('theme-invert', document.body.classList.contains('invert-mode'));
            });

            // -----------------------------------------
            // 4. 프로젝트 목록 조회, 카드 렌더링 및 드래그 앤 드롭 기능
            // -----------------------------------------
            const projectsCardsList = document.getElementById('projects-cards-list');

            // 날짜 포맷터
            const formatProjectDateLocal = (proj) => {
                const start = proj.startDate || '';
                const end = proj.endDate || '';
                const mode = proj.dateDisplayMode || 'period';
                const formatDots = (s) => s.replace(/-/g, '.');

                if (mode === 'period') {
                    const formattedStart = formatDots(start);
                    const formattedEnd = (end.toLowerCase() === 'ongoing' || end === '진행 중' || !end) ? 'ONGOING' : formatDots(end);
                    return `${formattedStart} - ${formattedEnd}`;
                } else if (mode === 'ongoing') {
                    return `${formatDots(start)} ~`;
                } else {
                    const target = (end && end !== '진행 중' && end.toLowerCase() !== 'ongoing') ? end : start;
                    if (!target) return '';
                    const separator = target.includes('.') ? '.' : '-';
                    const parts = target.split(separator);
                    if (parts.length >= 2) return `${parts[0]}.${parts[1]}`;
                    return formatDots(target);
                }
            };

            // 프로젝트 로드 및 카드 렌더링
            async function loadProjects() {
                try {
                    const res = await fetch('/api/projects');
                    const projects = await res.json();
                    
                    projectsCardsList.innerHTML = '';
                    
                    if (projects.length === 0) {
                        projectsCardsList.innerHTML = `
                        <div class="table-empty-message">등록된 프로젝트가 없습니다.</div>`;
                        return;
                    }

                    projects.forEach((proj, idx) => {
                        const card = document.createElement('div');
                        card.className = 'admin-project-card';
                        card.setAttribute('draggable', 'false');
                        card.setAttribute('data-id', proj.id);
                        
                        const formattedDate = formatProjectDateLocal(proj);
                        
                        card.innerHTML = `
                            <div class="card-left">
                                <button class="btn-drag-handle" title="드래그하여 순서 변경">⠿</button>
                                <span class="card-num">${String(idx + 1).padStart(2, '0')}</span>
                                <div class="card-info">
                                    <h3 class="card-title">${proj.title}</h3>
                                    <span class="card-date">${formattedDate}</span>
                                </div>
                            </div>
                            <div class="card-actions">
                                <button class="btn-simple-action btn-delete-simple" data-id="${proj.id}">삭제</button>
                            </div>
                        `;

                        card.addEventListener('click', (e) => {
                            if (isReorderMode) return;

                            // 삭제 버튼이 있는 액션 영역이나 드래그 핸들 조작 시 이동 차단
                            if (e.target.closest('.card-actions') || e.target.closest('.btn-drag-handle')) {
                                return;
                            }

                            window.location.href = `/form.html?id=${proj.id}`;
                        });

                        projectsCardsList.appendChild(card);
                    });

                    // 삭제 버튼 이벤트 바인딩
                    document.querySelectorAll('.btn-delete-simple').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            e.stopPropagation(); // 카드 클릭 전파 방지
                            const id = btn.getAttribute('data-id');
                            if (confirm('이 프로젝트를 영구 삭제하시겠습니까?')) {
                                await deleteProject(id);
                            }
                        });
                    });

                    // 드래그 앤 드롭 바인딩
                    initDragAndDrop();
                    bindHoverEffects();

                } catch (err) {
                    console.error('프로젝트 조회 에러:', err);
                }
            }

            // 프로젝트 삭제 요청
            async function deleteProject(id) {
                try {
                    const res = await fetch(`/api/projects/${id}`, {
                        method: 'DELETE'
                    });
                    const data = await res.json();

                    if (res.ok && data.success) {
                        loadProjects();
                    } else {
                        alert('삭제 실패: ' + (data.message || '오류 발생'));
                    }
                } catch (err) {
                    console.error('삭제 요청 에러:', err);
                }
            }

            // 드래그 앤 드롭 정렬 상태 관리
            let dragSourceEl = null;
            let isHandleMouseDown = false;
            let isReorderMode = false;
            let originalCardOrder = []; // 취소 시 복구할 원본 순서 (ID 목록)

            // 마우스/터치가 어디서든 떼어졌을 때 드래그 핸들 상태 해제 (상태 고정 방지)
            document.addEventListener('mouseup', () => { isHandleMouseDown = false; });
            document.addEventListener('touchend', () => { isHandleMouseDown = false; });

            const btnReorderStart = document.getElementById('btn-reorder-start');
            const reorderBtnText = document.getElementById('reorder-btn-text');
            const btnAddProjNav = document.getElementById('btn-add-proj-nav');

            btnReorderStart.addEventListener('click', async () => {
                if (!isReorderMode) {
                    isReorderMode = true;
                    projectsCardsList.classList.add('reorder-mode');
                    
                    // 원본 순서 임시 저장 (ID 목록)
                    originalCardOrder = Array.from(projectsCardsList.children).map(card => card.getAttribute('data-id'));
                    
                    setCardsDraggable(true);
                    
                    // 프로젝트 등록 버튼 숨김
                    btnAddProjNav.classList.add('hidden');
                    
                    // 텍스트 전환
                    reorderBtnText.innerText = '변경 완료';
                } else {
                    // 새로운 순서 최종 저장
                    await saveNewOrder();
                    
                    isReorderMode = false;
                    projectsCardsList.classList.remove('reorder-mode');
                    
                    setCardsDraggable(false);
                    
                    // 프로젝트 등록 버튼 복구
                    btnAddProjNav.classList.remove('hidden');
                    
                    // 텍스트 복구
                    reorderBtnText.innerText = '순서 변경';
                }
            });

            function setCardsDraggable(draggable) {
                const cards = document.querySelectorAll('.admin-project-card');
                cards.forEach(card => {
                    card.setAttribute('draggable', draggable ? 'true' : 'false');
                });
            }

            function handleDragStart(e) {
                if (!isHandleMouseDown || !isReorderMode) {
                    e.preventDefault();
                    return;
                }
                this.classList.add('dragging');
                dragSourceEl = this;
                e.dataTransfer.effectAllowed = 'move';
            }

            function handleDragOver(e) {
                if (e.preventDefault) {
                    e.preventDefault();
                }
                e.dataTransfer.dropEffect = 'move';
                if (this !== dragSourceEl) {
                    this.classList.add('drag-over');
                }
                return false;
            }

            function handleDragLeave(e) {
                this.classList.remove('drag-over');
            }

            function handleDrop(e) {
                if (e.stopPropagation) {
                    e.stopPropagation();
                }
                this.classList.remove('drag-over');
                
                if (dragSourceEl !== this) {
                    const list = document.getElementById('projects-cards-list');
                    const cards = Array.from(list.children);
                    const sourceIdx = cards.indexOf(dragSourceEl);
                    const targetIdx = cards.indexOf(this);
                    
                    if (sourceIdx < targetIdx) {
                        list.insertBefore(dragSourceEl, this.nextSibling);
                    } else {
                        list.insertBefore(dragSourceEl, this);
                    }
                    
                    // 번호 라벨만 화면에 즉시 순서대로 재배치
                    Array.from(list.children).forEach((card, idx) => {
                        card.querySelector('.card-num').innerText = String(idx + 1).padStart(2, '0');
                    });
                }
                return false;
            }

            function handleDragEnd(e) {
                this.classList.remove('dragging');
                const cards = document.querySelectorAll('.admin-project-card');
                cards.forEach(card => card.classList.remove('drag-over'));
                isHandleMouseDown = false; // 드래그 완료 시 핸들 상태 초기화
            }

            async function saveNewOrder() {
                const list = document.getElementById('projects-cards-list');
                const cardIds = Array.from(list.children).map(card => card.getAttribute('data-id'));
                
                try {
                    const res = await fetch('/api/projects/reorder', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ order: cardIds })
                    });
                    const data = await res.json();
                    if (!res.ok || !data.success) {
                        alert('순서 저장 실패: ' + (data.message || '오류 발생'));
                    } else {
                        // 카드 번호 라벨 최종 확인 재배치
                        Array.from(list.children).forEach((card, idx) => {
                            card.querySelector('.card-num').innerText = String(idx + 1).padStart(2, '0');
                        });
                    }
                } catch (err) {
                    console.error('순서 저장 에러:', err);
                }
            }

            function initDragAndDrop() {
                const cards = document.querySelectorAll('.admin-project-card');
                cards.forEach(card => {
                    card.addEventListener('dragstart', handleDragStart);
                    card.addEventListener('dragover', handleDragOver);
                    card.addEventListener('dragleave', handleDragLeave);
                    card.addEventListener('drop', handleDrop);
                    card.addEventListener('dragend', handleDragEnd);
                    
                    const handle = card.querySelector('.btn-drag-handle');
                    if (handle) {
                        handle.addEventListener('mousedown', () => { isHandleMouseDown = true; });
                        handle.addEventListener('mouseup', () => { isHandleMouseDown = false; });
                        handle.addEventListener('touchstart', () => { isHandleMouseDown = true; });
                        handle.addEventListener('touchend', () => { isHandleMouseDown = false; });
                    }
                });
            }

            // 초기 구동
            loadProjects();


        });
    </script>
</body>
</html>
