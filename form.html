<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 관리 - YOONZDA</title>
    <link rel="icon" type="image/png" href="images/logo-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 초기 테마 반전(Invert) 설정: 첫 렌더링 전 깜빡임 차단 -->
    <script>
        if (localStorage.getItem('theme-invert') === 'true') {
            document.body.classList.add('invert-mode');
        }
    </script>
    <!-- 커스텀 커서 -->
    <div class="custom-cursor"></div>

    <!-- 노이즈 캔버스 배경 -->
    <canvas id="noise-canvas"></canvas>

    <!-- 상단 내비게이션 바 -->
    <header>
        <a href="/" class="logo" id="home-link">
            <img src="images/logo-icon.png" alt="YOONZDA" class="logo-icon">
            <div class="logo-text-group">
                <span class="logo-title">yoonzda<span class="logo-dot">.</span></span>
                <span class="logo-subtitle">Creative Web Developer</span>
            </div>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="#" class="nav-link" id="toggle-invert">INVERT</a></li>
                <li><a href="/" class="nav-link" id="back-link">GO TO SITE</a></li>
            </ul>
        </nav>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="main-content">
        
        <div id="admin-panel" class="admin-panel-container">
            <div class="admin-title-row">
                <div>
                    <span class="project-category" id="form-category-label">NEW ENTRY</span>
                    <h1 class="project-title admin-header-title" id="form-action-title">프로젝트 등록</h1>
                </div>
                <div class="admin-action-group">
                    <a href="/list.html" class="btn-back-arrow" id="btn-back-to-list" aria-label="목록으로 이동">
                        <span class="arrow-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 1.6rem; height: 1.6rem; display: block;">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </span>
                        <span class="arrow-text">목록으로</span>
                    </a>
                </div>
            </div>
            
            <form id="project-form">
                <input type="hidden" id="projectId">
                
                <div class="form-group">
                    <label for="title" class="label-brutal">프로젝트 제목</label>
                    <input type="text" id="title" class="input-brutal" required>
                </div>
                
                <div class="form-group" id="project-period-row">
                    <label for="startYear" class="label-brutal">프로젝트 기간</label>
                    <div class="period-control-group">
                        <!-- 시작일 그룹 -->
                        <div class="date-select-group" id="start-date-group">
                            <select id="startYear" class="select-brutal" required>
                                <option value="" disabled selected>연도</option>
                            </select>
                            <select id="startMonth" class="select-brutal" required>
                                <option value="" disabled selected>월</option>
                            </select>
                        </div>
                        
                        <!-- 구분선 ~ -->
                        <span class="period-separator" id="period-separator">~</span>
                        
                        <!-- 완료일 그룹 -->
                        <div class="date-select-group" id="end-date-group">
                            <select id="endYear" class="select-brutal">
                                <option value="" disabled selected>연도</option>
                            </select>
                            <select id="endMonth" class="select-brutal">
                                <option value="" disabled selected>월</option>
                            </select>
                        </div>
                        
                        <!-- 진행 중 배지 -->
                        <span class="ongoing-badge hidden" id="ongoing-badge">진행 중</span>
                    </div>
                </div>

                <!-- 기간 노출 방식 선택 (라디오 버튼) -->
                <div class="form-group">
                    <label for="dateDisplayMode-period" class="label-brutal">기간 노출 방식</label>
                    <div class="radio-group-brutal">
                        <label class="radio-label-brutal" for="dateDisplayMode-period">
                            <input type="radio" id="dateDisplayMode-period" name="dateDisplayMode" value="period" checked>
                            <span class="radio-custom"></span>
                            기간
                        </label>
                        <label class="radio-label-brutal" for="dateDisplayMode-ongoing">
                            <input type="radio" id="dateDisplayMode-ongoing" name="dateDisplayMode" value="ongoing">
                            <span class="radio-custom"></span>
                            진행 중
                        </label>
                        <label class="radio-label-brutal" for="dateDisplayMode-single">
                            <input type="radio" id="dateDisplayMode-single" name="dateDisplayMode" value="single">
                            <span class="radio-custom"></span>
                            단일
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="projectType" class="label-brutal">프로젝트 분류</label>
                    <select id="projectType" class="select-brutal" required>
                        <option value="" disabled selected>선택해 주세요</option>
                        <option value="개인 프로젝트">개인 프로젝트</option>
                        <option value="팀 프로젝트">팀 프로젝트</option>
                        <option value="사내 업무">사내 업무</option>
                        <option value="외주">외주</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="role" class="label-brutal">프로젝트 역할</label>
                    <input type="text" id="role" class="input-brutal" required>
                </div>

                <div class="form-group">
                    <label for="contribution" class="label-brutal">프로젝트 기여도</label>
                    <input type="text" id="contribution" class="input-brutal" required>
                </div>

                <div class="form-group">
                    <label for="techStack" class="label-brutal">기술 스택</label>
                    <input type="text" id="techStack" class="input-brutal" required>
                </div>

                <div class="form-group">
                    <label for="link" class="label-brutal">프로젝트 링크</label>
                    <input type="text" id="link" class="input-brutal">
                </div>

                <div class="form-group">
                    <label for="githubLink" class="label-brutal">깃허브 링크</label>
                    <input type="text" id="githubLink" class="input-brutal">
                </div>

                <div class="form-group">
                    <label for="figmaLink" class="label-brutal">피그마 링크</label>
                    <input type="text" id="figmaLink" class="input-brutal">
                </div>

                <div class="form-group">
                    <label for="notionLink" class="label-brutal">노션 링크</label>
                    <input type="text" id="notionLink" class="input-brutal">
                </div>

                <div class="form-group">
                    <label for="imageFile" class="label-brutal">이미지 등록</label>
                    <div class="file-upload-wrapper">
                        <div class="file-upload-row">
                            <input type="file" id="imageFile" accept="image/*" class="file-input-hidden" style="display: none;">
                            <button type="button" class="btn-brutal btn-file-trigger" onclick="document.getElementById('imageFile').click()">파일 선택</button>
                            <span class="file-name-display" id="file-name-display">선택된 파일 없음</span>
                        </div>
                        <input type="hidden" id="imageUrl">
                        <div class="image-preview-box hidden" id="image-preview-box">
                            <img src="" id="image-preview" alt="미리보기">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subtitle" class="label-brutal">한 줄 요약</label>
                    <input type="text" id="subtitle" class="input-brutal" required>
                </div>

                <div class="form-group">
                    <label for="troubleshooting" class="label-brutal">문제 해결 및 성과</label>
                    <textarea id="troubleshooting" class="textarea-brutal"></textarea>
                </div>

                <div class="form-group">
                    <label for="description" class="label-brutal">상세 설명</label>
                    <textarea id="description" class="textarea-brutal" required></textarea>
                </div>

                <!-- 저장 버튼은 하단 플로팅 바에 위치함 -->
            </form>
        </div>
    </main>

    <!-- 하단 플로팅 액션 바 (저장하기용) -->
    <div class="floating-action-bar" id="form-floating-bar">
        <button type="submit" form="project-form" id="btn-submit" class="btn-floating-pill">
            <span class="btn-dot-glow"></span>
            <span id="btn-submit-text">저장하기</span>
        </button>
    </div>

    <!-- 폼 로직 스크립트 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -----------------------------------------
            // 1. 커스텀 마우스 커서 (Lerp)
            // -----------------------------------------
            const cursor = document.querySelector('.custom-cursor');
            let mouseX = 0, mouseY = 0;
            let cursorX = 0, cursorY = 0;
            const lerpFactor = 0.1;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * lerpFactor;
                cursorY += (mouseY - cursorY) * lerpFactor;
                cursor.style.transform = `translate3d(${cursorX - 10}px, ${cursorY - 10}px, 0)`;
                requestAnimationFrame(animateCursor);
            }
            requestAnimationFrame(animateCursor);

            // 호버 감지
            function bindHoverEffects() {
                const interactiveElements = document.querySelectorAll('a, button, input, select, textarea');
                interactiveElements.forEach(el => {
                    el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                    el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
                });
            }
            bindHoverEffects();

            // -----------------------------------------
            // 2. 필름 노이즈(Film Grain) 효과
            // -----------------------------------------
            const canvas = document.getElementById('noise-canvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            });

            function renderNoise() {
                ctx.clearRect(0, 0, w, h);
                const idata = ctx.createImageData(w, h);
                const buffer32 = new Uint32Array(idata.data.buffer);
                const len = buffer32.length;
                
                for (let i = 0; i < len; i += 13) {
                    if (Math.random() < 0.05) {
                        buffer32[i] = 0x15ffffff;
                    }
                }
                ctx.putImageData(idata, 0, 0);
                setTimeout(() => {
                    requestAnimationFrame(renderNoise);
                }, 50);
            }
            requestAnimationFrame(renderNoise);

            // 3. 테마 반전 토글
            const btnInvert = document.getElementById('toggle-invert');



            btnInvert.addEventListener('click', (e) => {
                e.preventDefault();
                document.body.classList.toggle('invert-mode');
                localStorage.setItem('theme-invert', document.body.classList.contains('invert-mode'));
            });
            // -----------------------------------------
            // 3-2. 이미지 파일 업로드 & 미리보기 로직
            // -----------------------------------------
            const imageFile = document.getElementById('imageFile');
            const fileNameDisplay = document.getElementById('file-name-display');
            const imageUrlInput = document.getElementById('imageUrl');
            const imagePreviewBox = document.getElementById('image-preview-box');
            const imagePreview = document.getElementById('image-preview');

            imageFile.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    fileNameDisplay.innerText = file.name;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        imageUrlInput.value = event.target.result; // Base64 data URL
                        imagePreview.src = event.target.result;
                        imagePreviewBox.classList.remove('hidden');
                    };
                    reader.readAsDataURL(file);
                } else {
                    fileNameDisplay.innerText = '선택된 파일 없음';
                    imageUrlInput.value = '';
                    imagePreview.src = '';
                    imagePreviewBox.classList.add('hidden');
                }
            });

            // -----------------------------------------
            // 4. 연도 및 월 셀렉트 박스 동적 생성
            // -----------------------------------------
            const startYearSelect = document.getElementById('startYear');
            const endYearSelect = document.getElementById('endYear');
            const startMonthSelect = document.getElementById('startMonth');
            const endMonthSelect = document.getElementById('endMonth');
            
            const currentYear = new Date().getFullYear();
            
            // 2015년부터 현재 연도 + 5년까지 생성 (역순)
            for (let y = currentYear + 5; y >= 2015; y--) {
                const optStart = new Option(`${y}년`, y);
                const optEnd = new Option(`${y}년`, y);
                startYearSelect.add(optStart);
                endYearSelect.add(optEnd);
            }
            
            // 1월부터 12월까지 생성 (앞에 0 패딩)
            for (let m = 1; m <= 12; m++) {
                const mStr = String(m).padStart(2, '0');
                const optStart = new Option(`${m}월`, mStr);
                const optEnd = new Option(`${m}월`, mStr);
                startMonthSelect.add(optStart);
                endMonthSelect.add(optEnd);
            }

            // -----------------------------------------
            // 4-2. 날짜 입력 필드 노출 제어 로직 (셀렉트 박스 방식)
            // -----------------------------------------
            const startDateGroup = document.getElementById('start-date-group');
            const endDateGroup = document.getElementById('end-date-group');
            const periodSeparator = document.getElementById('period-separator');
            const ongoingBadge = document.getElementById('ongoing-badge');

            function updateDateFieldsVisibility(mode) {
                if (mode === 'period') {
                    startDateGroup.classList.remove('hidden');
                    endDateGroup.classList.remove('hidden');
                    periodSeparator.classList.remove('hidden');
                    ongoingBadge.classList.add('hidden');
                    
                    startYearSelect.required = true;
                    startMonthSelect.required = true;
                    endYearSelect.required = true;
                    endMonthSelect.required = true;
                } else if (mode === 'ongoing') {
                    startDateGroup.classList.remove('hidden');
                    endDateGroup.classList.add('hidden');
                    periodSeparator.classList.remove('hidden');
                    ongoingBadge.classList.remove('hidden');
                    
                    startYearSelect.required = true;
                    startMonthSelect.required = true;
                    endYearSelect.required = false;
                    endMonthSelect.required = false;
                    
                    endYearSelect.value = '';
                    endMonthSelect.value = '';
                } else if (mode === 'single') {
                    startDateGroup.classList.add('hidden');
                    endDateGroup.classList.remove('hidden');
                    periodSeparator.classList.add('hidden');
                    ongoingBadge.classList.add('hidden');
                    
                    startYearSelect.required = false;
                    startMonthSelect.required = false;
                    endYearSelect.required = true;
                    endMonthSelect.required = true;
                    
                    startYearSelect.value = '';
                    startMonthSelect.value = '';
                }
            }

            // 라디오 버튼 이벤트 감지
            document.querySelectorAll('input[name="dateDisplayMode"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    updateDateFieldsVisibility(e.target.value);
                });
            });

            // 초기 호출
            updateDateFieldsVisibility('period');

            // -----------------------------------------
            // 5. 폼 데이터 로드 (수정 모드 확인)
            // -----------------------------------------
            const projectForm = document.getElementById('project-form');
            const btnBackToList = document.getElementById('btn-back-to-list');
            
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const isEdit = !!projectId;

            // 수정(상세 조회) 모드인 경우 데이터 가져와 채우기
            if (isEdit) {
                document.getElementById('form-category-label').innerText = 'PROJECT DETAIL';
                document.getElementById('form-action-title').innerText = '프로젝트 상세 정보';
                document.getElementById('btn-submit-text').innerText = '저장하기';
                document.getElementById('projectId').value = projectId;
                loadProjectDetails(projectId);
            }

            async function loadProjectDetails(id) {
                try {
                    const res = await fetch('/api/projects');
                    const projects = await res.json();
                    const proj = projects.find(p => p.id === id);
                    if (proj) {
                        document.getElementById('title').value = proj.title || '';
                        
                        if (proj.imageUrl) {
                            document.getElementById('imageUrl').value = proj.imageUrl;
                            document.getElementById('image-preview').src = proj.imageUrl;
                            document.getElementById('image-preview-box').classList.remove('hidden');
                            document.getElementById('file-name-display').innerText = '기존 이미지';
                        }

                        document.getElementById('projectType').value = proj.projectType || '';
                        document.getElementById('githubLink').value = proj.githubLink || '';
                        document.getElementById('figmaLink').value = proj.figmaLink || '';
                        document.getElementById('notionLink').value = proj.notionLink || '';
                        document.getElementById('subtitle').value = proj.subtitle || '';
                        document.getElementById('troubleshooting').value = proj.troubleshooting || '';
                        
                        if (proj.startDate) {
                            const [sYear, sMonth] = proj.startDate.replace(/-/g, '.').split('.');
                            document.getElementById('startYear').value = sYear || '';
                            document.getElementById('startMonth').value = sMonth || '';
                        }
                        if (proj.endDate) {
                            const [eYear, eMonth] = proj.endDate.replace(/-/g, '.').split('.');
                            document.getElementById('endYear').value = eYear || '';
                            document.getElementById('endMonth').value = eMonth || '';
                        }
                        
                        const mode = proj.dateDisplayMode || 'period';
                        const radio = document.querySelector(`input[name="dateDisplayMode"][value="${mode}"]`);
                        if (radio) {
                            radio.checked = true;
                        }
                        updateDateFieldsVisibility(mode);
                        document.getElementById('contribution').value = proj.contribution || '';
                        document.getElementById('role').value = proj.role || '';
                        document.getElementById('techStack').value = proj.techStack || '';
                        document.getElementById('link').value = proj.link || '';
                        document.getElementById('description').value = proj.description || '';
                    } else {
                        alert('해당 프로젝트 데이터를 찾을 수 없습니다.');
                        window.location.href = '/list.html';
                    }
                } catch (err) {
                    console.error('데이터 로딩 오류:', err);
                    alert('데이터를 가져오는 도중 오류가 발생했습니다.');
                    window.location.href = '/list.html';
                }
            }

            // 목록으로 돌아가기
            if (btnBackToList) {
                btnBackToList.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = '/list.html';
                });
            }

            projectForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const id = document.getElementById('projectId').value;
                const title = document.getElementById('title').value;
                const category = '';
                const imageUrl = document.getElementById('imageUrl').value;
                const dateDisplayMode = document.querySelector('input[name="dateDisplayMode"]:checked').value;

                if (!imageUrl) {
                    alert('이미지를 등록해 주세요.');
                    document.getElementById('imageFile').click();
                    return;
                }

                const sYear = document.getElementById('startYear').value;
                const sMonth = document.getElementById('startMonth').value;
                const eYear = document.getElementById('endYear').value;
                const eMonth = document.getElementById('endMonth').value;

                let startDate = '';
                let endDate = '';

                // 모드별 날짜 유효성 검사 및 데이터 가공
                if (dateDisplayMode === 'period') {
                    if (!sYear || !sMonth) {
                        alert('시작일 연도와 월을 모두 선택해 주세요.');
                        document.getElementById('startYear').focus();
                        return;
                    }
                    if (!eYear || !eMonth) {
                        alert('완료일 연도와 월을 모두 선택해 주세요.');
                        document.getElementById('endYear').focus();
                        return;
                    }
                    
                    const startVal = parseInt(sYear + sMonth, 10);
                    const endVal = parseInt(eYear + eMonth, 10);
                    if (startVal > endVal) {
                        alert('시작일은 완료일보다 이전이거나 같아야 합니다.');
                        document.getElementById('startYear').focus();
                        return;
                    }
                    
                    startDate = `${sYear}.${sMonth}`;
                    endDate = `${eYear}.${eMonth}`;
                } else if (dateDisplayMode === 'ongoing') {
                    if (!sYear || !sMonth) {
                        alert('시작일 연도와 월을 선택해 주세요.');
                        document.getElementById('startYear').focus();
                        return;
                    }
                    startDate = `${sYear}.${sMonth}`;
                    endDate = '';
                } else if (dateDisplayMode === 'single') {
                    if (!eYear || !eMonth) {
                        alert('완료일 연도와 월을 선택해 주세요.');
                        document.getElementById('endYear').focus();
                        return;
                    }
                    startDate = '';
                    endDate = `${eYear}.${eMonth}`;
                }

                const projectType = document.getElementById('projectType').value;
                const role = document.getElementById('role').value;
                const contribution = document.getElementById('contribution').value;
                const techStack = document.getElementById('techStack').value;
                const link = document.getElementById('link').value;
                const githubLink = document.getElementById('githubLink').value;
                const figmaLink = document.getElementById('figmaLink').value;
                const notionLink = document.getElementById('notionLink').value;
                const subtitle = document.getElementById('subtitle').value;
                const troubleshooting = document.getElementById('troubleshooting').value;
                const description = document.getElementById('description').value;

                const payload = { 
                    title, 
                    category, 
                    imageUrl, 
                    startDate, 
                    endDate, 
                    dateDisplayMode, 
                    projectType,
                    role, 
                    contribution, 
                    techStack, 
                    link, 
                    githubLink,
                    figmaLink,
                    notionLink,
                    subtitle,
                    troubleshooting,
                    description 
                };

                const url = isEdit ? `/api/projects/${id}` : '/api/projects';
                const method = isEdit ? 'PUT' : 'POST';

                try {
                    const res = await fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();

                    if (res.ok && data.success) {
                        alert(isEdit ? '프로젝트가 성공적으로 수정되었습니다.' : '프로젝트가 성공적으로 등록되었습니다.');
                        window.location.href = '/list.html';
                    } else {
                        alert((isEdit ? '수정 실패: ' : '등록 실패: ') + (data.message || '오류 발생'));
                    }
                } catch (err) {
                    console.error('요청 에러:', err);
                    alert('요청 중 서버 에러가 발생했습니다.');
                }
            });


        });
    </script>
</body>
</html>
